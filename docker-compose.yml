# Developpement — stack identique sur Windows / Linux / macOS
#   npm run docker:dev

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-imw-dev-root}
      MYSQL_DATABASE: imw-parking_database
    ports:
      - "${MYSQL_PUBLISH_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-imw-dev-root}"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 25s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: "True"
      FLASK_USE_RELOADER: ${FLASK_USE_RELOADER:-true}
      API_HOST: 0.0.0.0
      API_PORT: "5000"
      MYSQL_HOST: db
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-imw-dev-root}
      MYSQL_DATABASE: imw-parking_database
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-docker-change-me}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    stdin_open: true
    tty: true

  web:
    image: node:22-bookworm-slim
    working_dir: /app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE_URL: http://localhost:5000
      DISABLE_HMR: ${DISABLE_HMR:-false}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
    depends_on:
      - api
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev"
    stdin_open: true
    tty: true

volumes:
  mysql_data:
  web_node_modules:
